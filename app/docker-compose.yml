# Local runtime — identical image to production.
# Single command to run the site: docker compose up --build
# Default port 8080; production hosts map 80 via WEB_PORT=80.
services:
  web:
    build: .
    container_name: warrior-code-web
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
