server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    # connect-src 'self' covers the contact form endpoint when it is same-origin.
    # script-src/connect-src also allow esm.sh (pinned Supabase JS client import,
    # see app/html/js/supabase-client.js), *.supabase.co (auth/data/functions
    # calls), and www.datos.gov.co (daily USD/COP exchange rate, see trm.js) —
    # see docs/AUTH_AND_AGENDAMIENTO.md. Wompi checkout is a full-page
    # redirect, not a fetch/XHR, so it needs no CSP entry.
    add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'self'; script-src 'self' https://esm.sh; connect-src 'self' https://esm.sh https://*.supabase.co https://www.datos.gov.co; form-action 'self'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Static assets: long cache (filenames should change when content changes)
    location ~* \.(css|js|webp|avif|png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
