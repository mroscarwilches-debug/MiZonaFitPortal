#Titulo que podré ver en la pestaña actions de mi repositorio
name: Mi Primer Workflow

#le digo a github que ejecute esto cada vez que alguien suba cambios
on:
  push:
    branches:
      - main

env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"

jobs:
  saludo:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Crear bucket S3 para estado remoto
        run: |
          aws s3api create-bucket \
            --bucket wilchesfitness-tfstate \
            --region us-east-1 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket wilchesfitness-tfstate \
            --versioning-configuration Status=Enabled

      - name: Initiate Terraform in terraform directory
        run: terraform init
        working-directory: terraform

      - name: Plan Terraform in terraform directory
        run: terraform plan
        working-directory: terraform

      - name: Apply Terraform in terraform directory
        run: terraform apply -auto-approve
        working-directory: terraform